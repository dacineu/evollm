<!DOCTYPE html>
<html>
<head>
    <title>EvoOS Simulation Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1f2e; color: #e1e3e8; }
        .test { margin: 10px 0; padding: 10px; background: #141925; border-radius: 4px; }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .info { color: #64b5f6; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #00b4d8; color: white; border: none; border-radius: 4px; }
        iframe { width: 100%; height: 600px; border: 2px solid #2d3748; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🧪 EvoOS Simulation Test Page</h1>
    
    <div class="test info">
        <strong>Server Status:</strong> <span id="server-status">Testing...</span>
    </div>
    
    <div class="test">
        <strong>Tests:</strong><br>
        <input type="checkbox" id="test1"> HTML loads<br>
        <input type="checkbox" id="test2"> CSS loads<br>
        <input type="checkbox" id="test3"> JavaScript loads<br>
        <input type="checkbox" id="test4"> Canvas renders<br>
        <input type="checkbox" id="test5"> Peers appear<br>
    </div>
    
    <button onclick="runTests()">Run Tests</button>
    <button onclick="window.open('http://127.0.0.1:8888/', '_blank')">Open Full Simulation</button>
    
    <h2>Live Preview</h2>
    <iframe id="sim-frame" src=""></iframe>
    
    <script>
        async function runTests() {
            document.getElementById('server-status').innerHTML = 'Running...';
            
            try {
                // Test 1: HTML accessible
                const htmlRes = await fetch('http://127.0.0.1:8888/');
                document.getElementById('test1').checked = htmlRes.ok;
                
                // Test 2: CSS accessible
                const cssRes = await fetch('http://127.0.0.1:8888/css/style.css');
                document.getElementById('test2').checked = cssRes.ok;
                
                // Test 3: JS accessible
                const jsRes = await fetch('http://127.0.0.1:8888/js/main.js');
                document.getElementById('test3').checked = jsRes.ok;
                
                if (htmlRes.ok && cssRes.ok && jsRes.ok) {
                    document.getElementById('server-status').innerHTML = '<span class="pass">✓ Server running correctly</span>';
                    document.getElementById('sim-frame').src = 'http://127.0.0.1:8888/';
                    
                    // Wait for iframe to load then check canvas
                    setTimeout(() => {
                        const iframe = document.getElementById('sim-frame');
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const canvas = iframeDoc.getElementById('sim-canvas');
                        
                        document.getElementById('test4').checked = !!canvas;
                        
                        // Check if simulation created peers
                        setTimeout(() => {
                            const sim = iframe.contentWindow.simulation;
                            if (sim) {
                                document.getElementById('test5').checked = sim.peers.length > 0;
                                console.log('Simulation found:', sim.peers.length, 'peers');
                            }
                        }, 2000);
                    }, 1000);
                } else {
                    document.getElementById('server-status').innerHTML = '<span class="fail">✗ Some files not accessible</span>';
                }
            } catch (e) {
                document.getElementById('server-status').innerHTML = '<span class="fail">✗ Error: ' + e.message + '</span>';
            }
        }
        
        // Auto-run tests on load
        window.onload = () => {
            setTimeout(runTests, 500);
        };
    </script>
</body>
</html>
